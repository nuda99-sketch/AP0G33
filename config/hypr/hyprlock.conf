# AP0G33 hyprlock — Tokyo Night

background {
    monitor =
    path = /usr/local/share/ap0g33/wallpapers/ap0g33-circuit.png
    blur_passes = 3
    blur_size = 6
    brightness = 0.55
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.2
    outer_color = rgb(7aa2f7)
    inner_color = rgb(1a1b26)
    font_color = rgb(c0caf5)
    check_color = rgb(e0af68)
    fail_color = rgb(f7768e)
    placeholder_text = <i>passphrase...</i>
    fade_on_empty = false
    rounding = 8
    position = 0, -60
    halign = center
    valign = center
}

label {
    monitor =
    text = AP0G33
    color = rgb(7aa2f7)
    font_size = 42
    font_family = JetBrains Mono
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(c0caf5)
    font_size = 20
    font_family = JetBrains Mono
    position = 0, 24
    halign = center
    valign = center
}
